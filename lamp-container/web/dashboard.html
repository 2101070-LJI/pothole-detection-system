<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep-Guardian Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { color: #333; }
        .user-info { display: flex; gap: 15px; align-items: center; }
        .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .status-card { padding: 20px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid #667eea; }
        .status-card h3 { color: #667eea; margin-bottom: 10px; font-size: 14px; }
        .status-card .value { font-size: 24px; font-weight: bold; color: #333; }
        .filters { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .filter-row { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 10px; }
        .filter-group { flex: 1; min-width: 150px; }
        .filter-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #666; }
        .filter-group select, .filter-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #5568d3; }
        .btn-secondary { background: #6c757d; }
        .btn-danger { background: #dc3545; }
        .btn-success { background: #28a745; }
        #map { width: 100%; height: 500px; border-radius: 8px; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab { padding: 10px 20px; cursor: pointer; border: none; background: none; color: #666; }
        .tab.active { color: #667eea; border-bottom: 2px solid #667eea; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .pothole-list { max-height: 500px; overflow-y: auto; }
        .pothole-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; gap: 15px; align-items: center; }
        .pothole-item:hover { background: #f8f9fa; }
        .pothole-image { width: 100px; height: 100px; object-fit: cover; border-radius: 5px; cursor: pointer; }
        .pothole-info { flex: 1; }
        .badge { padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .badge.valid { background: #28a745; color: white; }
        .badge.invalid { background: #dc3545; color: white; }
        .badge.critical { background: #dc3545; color: white; }
        .badge.high { background: #fd7e14; color: white; }
        .badge.medium { background: #ffc107; color: #333; }
        .badge.low { background: #28a745; color: white; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 5% auto; padding: 20px; border-radius: 10px; width: 90%; max-width: 800px; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close { font-size: 28px; font-weight: bold; cursor: pointer; }
        .login-modal { display: none; }
        .login-form { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .login-toggle { position: fixed; top: 20px; right: 20px; z-index: 1001; }
        .chatbot-container { position: fixed; bottom: 20px; right: 20px; width: 350px; max-height: 500px; background: white; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); display: none; flex-direction: column; z-index: 1000; }
        .chatbot-container.open { display: flex; }
        .chatbot-header { background: #667eea; color: white; padding: 15px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; }
        .chatbot-messages { flex: 1; overflow-y: auto; padding: 15px; max-height: 350px; }
        .chatbot-message { margin-bottom: 10px; padding: 10px; border-radius: 5px; }
        .chatbot-message.user { background: #667eea; color: white; text-align: right; }
        .chatbot-message.bot { background: #f0f0f0; color: #333; }
        .chatbot-input-container { display: flex; padding: 10px; border-top: 1px solid #eee; }
        .chatbot-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-right: 10px; }
        .chatbot-toggle { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: #667eea; color: white; border: none; border-radius: 50%; font-size: 24px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 999; }
    </style>
</head>
<body>
    <!-- 로그인 모달 (관리자용) -->
    <div id="loginModal" class="modal login-modal">
        <div class="login-form">
            <h2>🔐 관리자 로그인</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>사용자명</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn">로그인</button>
            </form>
            <div style="margin-top: 15px; font-size: 12px; color: #666;">
                <strong>기본 계정:</strong><br>
                관리자: admin / admin123<br>
                사용자: user / user123
            </div>
            <button type="button" class="btn btn-secondary" onclick="closeLoginModal()" style="margin-top: 10px; width: 100%;">취소</button>
        </div>
    </div>

    <!-- 로그인 버튼 (우측 상단) -->
    <button class="btn login-toggle" id="loginToggleBtn" onclick="showLoginModal()">🔐 로그인</button>
    <button class="btn login-toggle" id="logoutToggleBtn" onclick="logout()" style="display: none;">로그아웃 (<span id="userNameDisplay"></span>)</button>

    <div class="container" id="mainContainer">
        <div class="header">
            <h1>🛣️ Deep-Guardian 포트홀 모니터링 시스템</h1>
        </div>

        <!-- 통계 카드 -->
        <div class="status-grid" id="statisticsCards"></div>

        <!-- 필터 -->
        <div class="filters">
            <div class="filter-row">
                <div class="filter-group">
                    <label>기간 (일)</label>
                    <input type="number" id="filterDays" value="7" min="0">
                </div>
                <div class="filter-group">
                    <label>최소 깊이 비율</label>
                    <input type="number" id="filterMinDepth" value="0" min="0" max="1" step="0.1">
                </div>
                <div class="filter-group">
                    <label>최소 우선순위</label>
                    <input type="number" id="filterMinPriority" value="0" min="0">
                </div>
                <div class="filter-group">
                    <label>위험도</label>
                    <select id="filterRiskLevel" multiple>
                        <option value="critical">Critical</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>검증 상태</label>
                    <select id="filterValidated">
                        <option value="all">전체</option>
                        <option value="true">검증됨</option>
                        <option value="false">미검증</option>
                    </select>
                </div>
            </div>
            <div class="filter-row">
                <button class="btn" onclick="loadData()">새로고침</button>
                <button class="btn btn-secondary" onclick="exportData('csv')">CSV 내보내기</button>
                <button class="btn btn-secondary" onclick="exportData('json')">JSON 내보내기</button>
                <button class="btn btn-success" id="adminReviewBtn" onclick="showAdminReview()" style="display: none;">관리자 검토</button>
            </div>
        </div>

        <!-- 탭 -->
        <div class="tabs">
            <button class="tab active" onclick="showTab('map')">지도</button>
            <button class="tab" onclick="showTab('list')">목록</button>
            <button class="tab" onclick="showTab('statistics')">통계</button>
            <button class="tab" onclick="showTab('videos')">비디오 결과</button>
        </div>

        <!-- 지도 탭 -->
        <div id="mapTab" class="tab-content active">
            <div id="map"></div>
        </div>

        <!-- 목록 탭 -->
        <div id="listTab" class="tab-content">
            <div class="pothole-list" id="potholeList"></div>
        </div>

        <!-- 통계 탭 -->
        <div id="statisticsTab" class="tab-content">
            <div id="statisticsCharts"></div>
        </div>

        <!-- 비디오 결과 탭 -->
        <div id="videosTab" class="tab-content">
            <div id="videoResults"></div>
        </div>
    </div>

    <!-- 이미지 미리보기 모달 -->
    <div id="imageModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>이미지 미리보기</h3>
                <span class="close" onclick="closeImageModal()">&times;</span>
            </div>
            <img id="modalImage" src="" style="width: 100%; max-height: 600px; object-fit: contain;">
        </div>
    </div>

    <!-- 챗봇 -->
    <button class="chatbot-toggle" onclick="toggleChatbot()">💬</button>
    <div class="chatbot-container" id="chatbotContainer">
        <div class="chatbot-header">
            <h3>🤖 Phi-3 챗봇</h3>
            <button onclick="toggleChatbot()" style="background: none; border: none; color: white; font-size: 20px; cursor: pointer;">×</button>
        </div>
        <div class="chatbot-messages" id="chatbotMessages">
            <div class="chatbot-message bot">안녕하세요! Deep-Guardian 포트홀 탐지 시스템 챗봇입니다. 무엇을 도와드릴까요?</div>
        </div>
        <div class="chatbot-input-container">
            <input type="text" class="chatbot-input" id="chatbotInput" placeholder="메시지를 입력하세요..." onkeypress="if(event.key==='Enter') sendChatMessage()">
            <button class="btn" onclick="sendChatMessage()">전송</button>
        </div>
    </div>

    <script>
        // Deep-Guardian Dashboard JavaScript

        let map, markers = [];
        let currentTab = 'map';
        let authStatus = { authenticated: false, user: null, is_admin: false };

        // 초기화
        document.addEventListener('DOMContentLoaded', function() {
            checkAuthStatus();
            initDashboard();
        });

        // 인증 상태 확인
        async function checkAuthStatus() {
            try {
                const response = await fetch('/api/auth/status');
                authStatus = await response.json();
                
                if (authStatus.authenticated) {
                    // 로그인된 경우
                    document.getElementById('loginToggleBtn').style.display = 'none';
                    document.getElementById('logoutToggleBtn').style.display = 'block';
                    document.getElementById('userNameDisplay').textContent = authStatus.user.username;
                    
                    // 관리자인 경우 관리자 버튼 표시
                    if (authStatus.is_admin) {
                        document.getElementById('adminReviewBtn').style.display = 'inline-block';
                    } else {
                        document.getElementById('adminReviewBtn').style.display = 'none';
                    }
                } else {
                    // 로그인되지 않은 경우
                    document.getElementById('loginToggleBtn').style.display = 'block';
                    document.getElementById('logoutToggleBtn').style.display = 'none';
                    document.getElementById('adminReviewBtn').style.display = 'none';
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                // 오류 발생 시에도 대시보드는 표시
                document.getElementById('loginToggleBtn').style.display = 'block';
                document.getElementById('logoutToggleBtn').style.display = 'none';
                document.getElementById('adminReviewBtn').style.display = 'none';
            }
        }

        // 로그인 모달 표시
        function showLoginModal() {
            document.getElementById('loginModal').style.display = 'block';
        }

        // 로그인 모달 닫기
        function closeLoginModal() {
            document.getElementById('loginModal').style.display = 'none';
        }

        // 로그인
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                if (data.success) {
                    closeLoginModal();
                    checkAuthStatus();
                    alert('로그인 성공! 관리자 기능을 사용할 수 있습니다.');
                } else {
                    alert('로그인 실패: ' + (data.error || '알 수 없는 오류'));
                }
            } catch (error) {
                alert('로그인 오류: ' + error.message);
            }
        });

        // 로그아웃
        async function logout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
                checkAuthStatus();
                alert('로그아웃되었습니다.');
            } catch (error) {
                console.error('Logout failed:', error);
            }
        }

        // 대시보드 초기화
        function initDashboard() {
            initMap();
            loadStatistics();
            loadData();
            loadVideoResults();
        }

        // 지도 초기화
        function initMap() {
            map = L.map('map').setView([37.5665, 126.9780], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
        }

        // 통계 로드
        async function loadStatistics() {
            try {
                const days = document.getElementById('filterDays').value || 7;
                const response = await fetch(`/api/statistics?days=${days}`);
                const stats = await response.json();
                
                if (stats.error) {
                    console.error('Statistics error:', stats.error);
                    return;
                }
                
                // 통계 카드 업데이트
                const cardsContainer = document.getElementById('statisticsCards');
                cardsContainer.innerHTML = `
                    <div class="status-card">
                        <h3>전체 탐지 수</h3>
                        <div class="value">${stats.total_count.toLocaleString()}</div>
                    </div>
                    <div class="status-card">
                        <h3>검증 통과</h3>
                        <div class="value">${stats.validated_count.toLocaleString()}</div>
                    </div>
                    <div class="status-card">
                        <h3>평균 깊이 비율</h3>
                        <div class="value">${stats.avg_depth_ratio.toFixed(3)}</div>
                    </div>
                    <div class="status-card">
                        <h3>최대 우선순위</h3>
                        <div class="value">${stats.max_priority.toFixed(1)}</div>
                    </div>
                `;
                
                // 통계 차트 (통계 탭이 활성화된 경우)
                if (currentTab === 'statistics') {
                    updateStatisticsCharts(stats);
                }
            } catch (error) {
                console.error('Load statistics failed:', error);
            }
        }

        // 통계 차트 업데이트
        function updateStatisticsCharts(stats) {
            const container = document.getElementById('statisticsCharts');
            
            // 위험도 분포 차트
            if (stats.risk_distribution && stats.risk_distribution.length > 0) {
                const riskData = stats.risk_distribution.map(r => ({ x: r.risk_level, y: r.count }));
                const riskChart = {
                    data: [{
                        x: riskData.map(d => d.x),
                        y: riskData.map(d => d.y),
                        type: 'bar'
                    }],
                    layout: { title: '위험도별 분포', height: 300 }
                };
                container.innerHTML = '<div id="riskChart"></div><div id="locationChart"></div>';
                Plotly.newPlot('riskChart', riskChart.data, riskChart.layout);
            }
            
            // 위치 유형 분포 차트
            if (stats.location_distribution && stats.location_distribution.length > 0) {
                const locationData = stats.location_distribution.map(l => ({ x: l.location_type, y: l.count }));
                const locationChart = {
                    data: [{
                        x: locationData.map(d => d.x),
                        y: locationData.map(d => d.y),
                        type: 'bar'
                    }],
                    layout: { title: '위치 유형별 분포', height: 300 }
                };
                Plotly.newPlot('locationChart', locationChart.data, locationChart.layout);
            }
        }

        // 데이터 로드
        async function loadData() {
            try {
                const params = new URLSearchParams();
                params.append('limit', '500');
                params.append('days', document.getElementById('filterDays').value || '0');
                params.append('min_depth', document.getElementById('filterMinDepth').value || '0');
                params.append('min_priority', document.getElementById('filterMinPriority').value || '0');
                const validated = document.getElementById('filterValidated').value;
                if (validated !== 'all') {
                    params.append('validated', validated === 'true');
                }
                
                const riskLevels = Array.from(document.getElementById('filterRiskLevel').selectedOptions).map(o => o.value);
                riskLevels.forEach(level => params.append('risk_level', level));
                
                const response = await fetch(`/api/potholes?${params.toString()}`);
                const data = await response.json();
                
                if (data.error) {
                    console.error('Load data error:', data.error);
                    return;
                }
                
                // 지도 업데이트
                updateMap(data.potholes);
                
                // 목록 업데이트
                updateList(data.potholes);
            } catch (error) {
                console.error('Load data failed:', error);
            }
        }

        // 지도 업데이트
        function updateMap(potholes) {
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];
            
            if (potholes.length === 0) return;
            
            potholes.forEach(pothole => {
                const marker = L.marker([pothole.latitude, pothole.longitude])
                    .addTo(map)
                    .bindPopup(`
                        <strong>포트홀 #${pothole.id}</strong><br>
                        깊이 비율: ${pothole.depth_ratio}<br>
                        검증: ${pothole.validation_result ? '통과' : '실패'}<br>
                        위험도: ${pothole.risk_level || 'N/A'}<br>
                        <button onclick="showImage(${pothole.id})">이미지 보기</button>
                    `);
                markers.push(marker);
            });
            
            if (markers.length > 0) {
                const group = new L.featureGroup(markers);
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }

        // 목록 업데이트
        function updateList(potholes) {
            const container = document.getElementById('potholeList');
            
            if (potholes.length === 0) {
                container.innerHTML = '<p style="text-align: center; padding: 20px; color: #666;">포트홀 데이터가 없습니다.</p>';
                return;
            }
            
            container.innerHTML = potholes.map(pothole => {
                const riskBadge = pothole.risk_level ? `<span class="badge ${pothole.risk_level}">${pothole.risk_level}</span>` : '';
                const validationBadge = `<span class="badge ${pothole.validation_result ? 'valid' : 'invalid'}">${pothole.validation_result ? '검증 통과' : '검증 실패'}</span>`;
                const imageUrl = pothole.image_path ? `/api/image/${pothole.id}` : '';
                
                return `
                    <div class="pothole-item">
                        ${imageUrl ? `<img src="${imageUrl}" class="pothole-image" onclick="showImage(${pothole.id})" alt="포트홀 이미지">` : '<div style="width: 100px; height: 100px; background: #eee; border-radius: 5px;"></div>'}
                        <div class="pothole-info">
                            <strong>포트홀 #${pothole.id}</strong>
                            <div>위도: ${pothole.latitude}, 경도: ${pothole.longitude}</div>
                            <div>깊이 비율: ${pothole.depth_ratio} | 우선순위: ${pothole.priority_score || 0}</div>
                            <div>탐지 시간: ${new Date(pothole.detected_at).toLocaleString('ko-KR')}</div>
                            <div style="margin-top: 5px;">
                                ${riskBadge} ${validationBadge}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 이미지 미리보기
        async function showImage(potholeId) {
            const modal = document.getElementById('imageModal');
            const img = document.getElementById('modalImage');
            img.src = `/api/image/${potholeId}`;
            modal.style.display = 'block';
        }

        function closeImageModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        // 탭 전환
        function showTab(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');
            
            if (tabName === 'statistics') {
                loadStatistics();
            } else if (tabName === 'videos') {
                loadVideoResults();
            }
        }

        // 데이터 내보내기
        function exportData(format) {
            const params = new URLSearchParams();
            params.append('format', format);
            params.append('limit', '10000');
            params.append('days', document.getElementById('filterDays').value || '0');
            const validated = document.getElementById('filterValidated').value;
            if (validated !== 'all') {
                params.append('validated', validated === 'true');
            }
            
            window.open(`/api/export?${params.toString()}`, '_blank');
        }

        // 비디오 결과 로드
        async function loadVideoResults() {
            try {
                const response = await fetch('/api/video-results');
                const data = await response.json();
                
                const container = document.getElementById('videoResults');
                if (data.videos && data.videos.length > 0) {
                    container.innerHTML = data.videos.map(video => `
                        <div style="padding: 15px; border-bottom: 1px solid #eee;">
                            <h3>${video.video_name || video.directory}</h3>
                            <div>상태: ${video.status === 'processing' ? '🟢 처리 중' : '✅ 완료'}</div>
                            <div>총 프레임: ${video.total_frames}</div>
                            <div>처리된 프레임: ${video.processed_frames}</div>
                            <div>총 탐지 수: ${video.total_detections}</div>
                            ${video.status === 'completed' && video.result_video_path ? 
                                `<a href="/shared_images/video_results/${video.directory}/${video.result_video_path.split('/').pop()}" download>동영상 다운로드</a>` : ''}
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p style="text-align: center; padding: 20px; color: #666;">비디오 결과가 없습니다.</p>';
                }
            } catch (error) {
                console.error('Load video results failed:', error);
            }
        }

        // 관리자 검토 페이지
        function showAdminReview() {
            if (!authStatus.authenticated || !authStatus.is_admin) {
                alert('관리자 권한이 필요합니다. 로그인해주세요.');
                showLoginModal();
                return;
            }
            window.open('/admin/review', '_blank');
        }

        // 챗봇
        function toggleChatbot() {
            document.getElementById('chatbotContainer').classList.toggle('open');
        }

        async function sendChatMessage() {
            const input = document.getElementById('chatbotInput');
            const message = input.value.trim();
            if (!message) return;
            
            const messagesDiv = document.getElementById('chatbotMessages');
            const userMsg = document.createElement('div');
            userMsg.className = 'chatbot-message user';
            userMsg.textContent = message;
            messagesDiv.appendChild(userMsg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            input.value = '';
            
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'chatbot-message bot';
            loadingMsg.textContent = '답변 생성 중...';
            messagesDiv.appendChild(loadingMsg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, use_advanced: true })
                });
                
                const data = await response.json();
                loadingMsg.remove();
                
                const botMsg = document.createElement('div');
                botMsg.className = 'chatbot-message bot';
                botMsg.textContent = data.success ? data.response : `오류: ${data.error}`;
                messagesDiv.appendChild(botMsg);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            } catch (error) {
                loadingMsg.remove();
                const errorMsg = document.createElement('div');
                errorMsg.className = 'chatbot-message bot';
                errorMsg.textContent = `연결 오류: ${error.message}`;
                messagesDiv.appendChild(errorMsg);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        }

        // 모달 외부 클릭 시 닫기
        window.onclick = function(event) {
            const imageModal = document.getElementById('imageModal');
            const loginModal = document.getElementById('loginModal');
            if (event.target === imageModal) {
                closeImageModal();
            }
            if (event.target === loginModal) {
                closeLoginModal();
            }
        }
    </script>
</body>
</html>
