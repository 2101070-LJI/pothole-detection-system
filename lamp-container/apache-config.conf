<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    # Python WSGI 애플리케이션
    WSGIDaemonProcess app python-path=/var/www/app python-home=/var/www/app/venv
    WSGIProcessGroup app
    WSGIScriptAlias /app /var/www/app/app.wsgi

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/app>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # 정적 파일 서빙
    Alias /shared_images /var/www/html/shared_images
    <Directory /var/www/html/shared_images>
        Options -Indexes
        Require all granted
    </Directory>

    # 로그 설정
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

