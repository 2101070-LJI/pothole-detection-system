# Apache configuration for Deep-Guardian Reverse Proxy
# Based on httpd:2.4-alpine default configuration

ServerRoot "/usr/local/apache2"
ServerName localhost
Listen 80

# Load required modules
LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule headers_module modules/mod_headers.so

# User and Group (Alpine specific)
User daemon
Group daemon

# Error log (access log disabled to avoid user check issues)
ErrorLog /proc/self/fd/2
LogLevel warn

# Virtual host configuration
<VirtualHost *:80>
    ServerName localhost
    
    # Proxy settings
    ProxyPreserveHost On
    ProxyRequests Off
    
    # Streamlit dashboard proxy
    ProxyPass / http://dashboard:8501/
    ProxyPassReverse / http://dashboard:8501/
    
    # Proxy timeout settings
    ProxyTimeout 300
    
    # CORS headers
    Header set Access-Control-Allow-Origin "*"
    Header set Access-Control-Allow-Methods "GET, POST, OPTIONS"
    Header set Access-Control-Allow-Headers "Content-Type, Authorization"
</VirtualHost>
