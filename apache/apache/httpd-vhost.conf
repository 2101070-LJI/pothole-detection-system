# Virtual host configuration for Deep-Guardian
# Apache proxies to Streamlit Dashboard
<VirtualHost *:80>
    ServerName localhost
    
    # Proxy settings
    ProxyPreserveHost On
    ProxyRequests Off
    
    # Streamlit dashboard proxy
    ProxyPass / http://dashboard:8501/
    ProxyPassReverse / http://dashboard:8501/
    
    # Proxy timeout settings
    ProxyTimeout 300
    
    # WebSocket support for Streamlit
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://dashboard:8501/$1" [P,L]
    
    # Serve shared images directly
    Alias /shared_images /usr/local/apache2/htdocs/shared_images
    <Directory /usr/local/apache2/htdocs/shared_images>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>
    
    # CORS headers
    Header set Access-Control-Allow-Origin "*"
    Header set Access-Control-Allow-Methods "GET, POST, OPTIONS"
    Header set Access-Control-Allow-Headers "Content-Type, Authorization"
    
    # Error and access logs
    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 common
</VirtualHost>



